<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In | Degxifi Internal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                        "surface-dark": "#162a24",
                        "border-dark": "#23483c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .login-bg {
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(16, 183, 127, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(16, 183, 127, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16, 183, 127, 0.05) 0%, transparent 50%);
        }

        .form-input:focus {
            border-color: #10b77f !important;
            box-shadow: 0 0 0 2px rgba(16, 183, 127, 0.2);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen font-display login-bg">
    <div class="min-h-screen flex flex-col">
        <!-- Minimal Top Bar -->
        <header class="sticky top-0 z-50">
            <div class="max-w-[1440px] mx-auto w-full flex items-center justify-between px-6 lg:px-10 h-16 mt-2">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-3">
                        <img src="../logo.png" alt="Degxifi Logo" class="size-8 rounded-full object-cover" />
                        <h2 class="text-slate-900 text-xl font-black tracking-tight">Degxifi</h2>
                    </div>
                    <div class="flex items-center gap-4">
                        <a class="text-slate-500 hover:text-primary text-sm font-medium transition-colors"
                            href="#">Help</a>
                        <a class="text-slate-500 hover:text-primary text-sm font-medium transition-colors"
                            href="#">Contact</a>
                    </div>
                </div>
        </header>

        <!-- Main Login Content -->
        <main class="flex-1 flex items-center justify-center px-4 py-8">
            <div class="w-full max-w-md">
                <!-- Floating Icon -->
                <div class="flex justify-center mb-8">
                    <div
                        class="size-20 rounded-2xl bg-primary/10 border border-primary/20 flex items-center justify-center float-animation overflow-hidden">
                        <img src="../logo.png" alt="Degxifi Logo" class="size-full object-cover" />
                    </div>
                </div>

                <!-- Login Card -->
                <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-2xl shadow-slate-200/50">
                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-black tracking-tight text-slate-900 mb-2">Welcome Back</h1>
                        <p class="text-slate-500 text-sm">Sign in to access the Degxifi Staff Portal</p>
                    </div>

                    <!-- Role Toggle -->
                    <div class="flex bg-slate-50 rounded-xl p-1 mb-8 border border-slate-200">
                        <button id="role-staff"
                            class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-primary text-white"
                            onclick="selectRole('staff')">
                            <span class="flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-lg">person</span>
                                Staff
                            </span>
                        </button>
                        <button id="role-admin"
                            class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-900"
                            onclick="selectRole('admin')">
                            <span class="flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-lg">admin_panel_settings</span>
                                Admin
                            </span>
                        </button>
                    </div>

                    <!-- Login Form -->
                    <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-600">Email Address</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
                                <input
                                    class="form-input w-full rounded-xl bg-slate-50 border-slate-200 text-slate-900 pl-11 pr-4 py-3 transition-all placeholder:text-slate-600"
                                    placeholder="you@degxifi.com" type="email" required />
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-semibold text-slate-600">Password</label>
                                <a class="text-xs font-medium text-primary hover:underline" href="#">Forgot
                                    password?</a>
                            </div>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
                                <input id="password-input"
                                    class="form-input w-full rounded-xl bg-slate-50 border-slate-200 text-slate-900 pl-11 pr-12 py-3 transition-all placeholder:text-slate-600"
                                    placeholder="Enter your password" type="password" required />
                                <button type="button"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors"
                                    onclick="togglePassword()">
                                    <span id="password-toggle-icon"
                                        class="material-symbols-outlined text-xl">visibility_off</span>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input
                                    class="rounded border-slate-200 bg-slate-50 text-primary focus:ring-primary focus:ring-offset-0"
                                    type="checkbox" />
                                <span class="text-sm text-slate-500">Remember me</span>
                            </label>
                        </div>

                        <button type="submit"
                            class="w-full py-3.5 bg-primary text-white font-black text-base rounded-xl shadow-xl shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                            <span>Sign In</span>
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
                        </button>
                    </form>

                </div>

                <!-- Security Notice -->
                <div class="mt-6 flex items-center justify-center gap-2 text-xs text-slate-500">
                    <span class="material-symbols-outlined text-sm text-primary/50">lock</span>
                    <span>256-bit encrypted connection • SOC2 Type II Compliant</span>
                </div>

                <!-- Footer Links -->
                <div class="mt-4 flex items-center justify-center gap-4 text-xs text-slate-500">
                    <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
                    <span class="text-primary/30">•</span>
                    <a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
                    <span class="text-primary/30">•</span>
                    <a class="hover:text-primary transition-colors" href="#">Security</a>
                </div>
            </div>
        </main>

        <!-- Bottom Bar -->
        <footer class="py-6 text-center">
            <p class="text-slate-600 text-xs">© 2024 Degxifi Protocol. All internal communications are monitored and
                encrypted.</p>
        </footer>
    </div>

    <script>
        let selectedRole = 'staff';

        function selectRole(role) {
            selectedRole = role;
            const staffBtn = document.getElementById('role-staff');
            const adminBtn = document.getElementById('role-admin');

            if (role === 'staff') {
                staffBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-primary text-white';
                adminBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-900';
            } else {
                adminBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-primary text-white';
                staffBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-900';
            }
        }

        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            // Route based on role selection
            if (selectedRole === 'staff') {
                window.location.href = '../staff_dashboard/code.html';
            } else {
                window.location.href = '../admin_staff_management/code.html';
            }
        }
    </script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Fallback Toast if showToast doesn't exist
        function fallbackToast(message, type="success") {
            if(typeof showToast === "function") {
                try {
                    showToast(message, type);
                    return;
                } catch(e) {}
            }
            // Create mini-toast
            const t = document.createElement("div");
            t.className = `fixed bottom-4 right-4 px-6 py-3 rounded-xl text-sm font-bold shadow-2xl z-[9999] transform transition-all translate-y-10 opacity-0 flex items-center gap-2 ${type === "success" ? "bg-primary text-white" : "bg-red-500 text-white"}`;
            t.innerHTML = `<span class="material-symbols-outlined text-lg">${type === 'success' ? 'check_circle' : 'error'}</span><span>${message}</span>`;
            document.body.appendChild(t);
            setTimeout(() => t.classList.remove("translate-y-10", "opacity-0"), 10);
            setTimeout(() => {
                t.classList.add("translate-y-10", "opacity-0");
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        // Intercept all '#' links
        document.querySelectorAll('a[href="#"]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                fallbackToast("Backend Action Pending: " + (this.textContent.trim() || 'Link clicked'), "success");
            });
        });

        // Pagination Buttons Interaction
        document.querySelectorAll('button').forEach(btn => {
            const txt = btn.textContent.trim();
            // Numbers 1, 2, 3...
            if(txt.match(/^[0-9]+$/) && btn.parentElement.classList.contains('gap-2')) {
                btn.addEventListener('click', function() {
                    fallbackToast("Fetching Page " + txt + " from database...", "success");
                    // Visual active state swap if applicable
                    this.parentElement.querySelectorAll('button').forEach(b => {
                        if(b.textContent.trim().match(/^[0-9]+$/)) {
                            b.classList.remove('bg-primary', 'text-white');
                            if(!b.classList.contains('text-slate-500')) {
                                b.classList.add('text-slate-500');
                            }
                        }
                    });
                    this.classList.remove('text-slate-500', 'bg-white');
                    this.classList.add('bg-primary', 'text-white');
                });
            }
            
            // Next / Prev Pagination 
            if(txt === 'chevron_left' || txt === 'chevron_right' || txt === 'keyboard_double_arrow_left' || txt === 'keyboard_double_arrow_right') {
                btn.addEventListener('click', function() {
                    fallbackToast("Navigating pages...", "success");
                });
            }
        });

        // Filter / Select dropdowns
        document.querySelectorAll('select').forEach(sel => {
            sel.addEventListener('change', function() {
                fallbackToast("Filtering data by: " + this.value, "success");
            });
        });
        
        // Top right bell icon / notification
        const notifBtn = document.querySelector('button:has(span:contains("notifications"))') || document.querySelector('button span.material-symbols-outlined:contains("notifications")');
        if(notifBtn) {
            notifBtn.parentElement.addEventListener('click', function() {
                fallbackToast("You have 0 unread alerts.");
            });
        }
        
    });
</script>
</body>

</html>
